<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Employee Time Scanner</title>
  <style>
    :root {
      --bg:    #0f0f1a;
      --card:  #1a1a2e;
      --bdr:   #2a2a4a;
      --blue:  #7eb8f7;
      --green: #2ecc71;
      --red:   #e74c3c;
      --muted: #888;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg); color: #fff;
      min-height: 100vh; display: flex;
      flex-direction: column; align-items: center;
      padding: 20px; gap: 16px;
      transition: background 0.3s;
    }
    h1  { font-size: 24px; color: var(--blue); margin-top: 10px; }
    .subtitle { font-size: 13px; color: var(--muted); }

    .mode-buttons { display: flex; gap: 12px; width: 100%; max-width: 440px; }
    .mode-btn {
      flex: 1; padding: 16px; border: none; border-radius: 14px;
      font-size: 17px; font-weight: bold; cursor: pointer;
      opacity: 0.45; transition: all 0.2s;
    }
    .mode-btn.active { opacity: 1; transform: scale(1.04); }
    .mode-btn.timein  { background: var(--green); color: #0f0f1a; }
    .mode-btn.timeout { background: var(--red);   color: #fff; }
    .mode-label { font-size: 13px; color: var(--muted); }
    .mode-label span { font-weight: bold; font-size: 15px; color: #fff; }

    .card {
      width: 100%; max-width: 440px;
      background: var(--card); border-radius: 18px;
      padding: 20px; border: 2px solid var(--bdr);
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }

    /* html5-qrcode scanner container */
    #qr-reader {
      width: 100%; max-width: 400px;
      border-radius: 12px; overflow: hidden;
      display: none;
    }
    /* Clean up the library's default UI */
    #qr-reader video { border-radius: 12px; }
    #qr-reader__dashboard_section_swaplink { display: none !important; }
    #qr-reader__status_span { display: none !important; }
    #qr-reader__header_message { display: none !important; }
    #qr-reader img[alt="Info icon"] { display: none !important; }
    #qr-reader__dashboard { padding: 5px !important; }
    #qr-reader__scan_region { min-height: 260px; background: #000; }

    .action-btn {
      width: 100%; padding: 15px; border: none; border-radius: 12px;
      font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s;
    }
    .btn-open    { background: linear-gradient(135deg, var(--blue), #4a90d9); color: #0f0f1a; }
    .btn-stop    { background: #2a2a4a; color: var(--red); border: 1px solid var(--red); display: none; }

    #camStatus { font-size: 13px; color: var(--muted); text-align: center; min-height: 18px; }

    .divider {
      width: 100%; max-width: 440px;
      display: flex; align-items: center; gap: 10px; color: #444; font-size: 13px;
    }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:#333; }

    .manual-input {
      width: 100%; padding: 14px; border-radius: 10px;
      background: var(--bg); border: 2px solid var(--bdr); color: #fff;
      font-size: 18px; text-align: center; text-transform: uppercase; letter-spacing: 2px;
    }
    .manual-input:focus { outline: none; border-color: var(--blue); }
    .btn-log {
      width: 100%; padding: 14px; background: #4a7c59;
      color: white; border: none; border-radius: 10px;
      font-size: 16px; font-weight: bold; cursor: pointer;
    }

    #result {
      width: 100%; max-width: 440px; padding: 18px; border-radius: 14px;
      font-size: 15px; line-height: 1.8; text-align: center;
      display: none; white-space: pre-line; font-weight: 500;
    }
    .success { background: #0d2b1a; border: 2px solid var(--green); color: var(--green); }
    .error   { background: #2b0d0d; border: 2px solid var(--red);   color: var(--red); }

    .spinner-wrap { display:none; text-align:center; color:var(--blue); font-size:14px; width:100%; max-width:440px; padding:10px; }
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 3px solid #333; border-top-color: var(--blue);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .last-scan { font-size: 12px; color: #444; text-align: center; }

    .setup-banner {
      width: 100%; max-width: 440px; padding: 14px;
      background: #2b1a0d; border: 2px solid #e67e22;
      border-radius: 12px; display: none; text-align: center;
      font-size: 13px; color: #e67e22; line-height: 1.6;
    }
    .setup-banner input {
      width: 100%; margin-top: 8px; padding: 10px;
      border-radius: 8px; border: 1px solid #e67e22;
      background: var(--bg); color: #fff; font-size: 13px;
      text-align: center;
    }
    .setup-banner button {
      margin-top: 8px; padding: 8px 20px;
      background: #e67e22; color: #fff; border: none;
      border-radius: 8px; font-weight: bold; cursor: pointer;
    }
  </style>
</head>
<body>

<div class="setup-banner" id="setupBanner">
  ⚠️ <strong>One-time setup:</strong> Paste your Google Apps Script Web App URL below.<br>
  <small>(Deploy → New Deployment → Web App → Copy URL)</small>
  <input type="text" id="setupUrl" placeholder="https://script.google.com/macros/s/.../exec">
  <button onclick="saveWebAppUrl()">💾 Save URL</button>
</div>

<h1 id="businessTitle">👥 Time Scanner</h1>
<p class="subtitle" id="businessSubtitle">Employee Attendance Logging</p>

<div class="mode-buttons">
  <button class="mode-btn timein active" id="btnIn"  onclick="setMode('timein')">⬆️ TIME IN</button>
  <button class="mode-btn timeout"       id="btnOut" onclick="setMode('timeout')">⬇️ TIME OUT</button>
</div>
<p class="mode-label">Mode: <span id="modeLabel">TIME IN</span></p>

<div class="card">
  <div id="qr-reader"></div>
  <button class="action-btn btn-open" id="btnOpen" onclick="startScanner()">📷 Open Camera</button>
  <button class="action-btn btn-stop" id="btnStop" onclick="stopScanner()">⏹ Stop Camera</button>
  <p id="camStatus">Tap Open Camera to begin scanning</p>
</div>

<div class="spinner-wrap" id="spinnerWrap">
  <span class="spinner"></span><span id="spinnerText">Processing...</span>
</div>

<div class="divider">or enter Employee ID manually</div>

<div class="card" style="gap:12px">
  <input type="text" id="manualId" class="manual-input"
         placeholder="EMP-001"
         onkeydown="if(event.key==='Enter') submitManual()">
  <button class="btn-log" onclick="submitManual()">✅ LOG ATTENDANCE</button>
</div>

<div id="result"></div>
<p class="last-scan" id="lastScan"></p>

<!-- html5-qrcode — uses native BarcodeDetector API when available, far more reliable than jsQR -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
  // ══════════════════════════════════════════════════════════
  // WEB APP URL
  // ══════════════════════════════════════════════════════════
  let WEB_APP_URL = localStorage.getItem('WEB_APP_URL') || '';
  if (!WEB_APP_URL) {
    document.getElementById('setupBanner').style.display = 'block';
  }

  function saveWebAppUrl() {
    const url = document.getElementById('setupUrl').value.trim();
    if (!url || !url.startsWith('https://script.google.com/')) {
      alert('Please enter a valid Google Apps Script Web App URL');
      return;
    }
    localStorage.setItem('WEB_APP_URL', url);
    WEB_APP_URL = url;
    document.getElementById('setupBanner').style.display = 'none';
    alert('✅ URL saved! You\'re ready to scan.');
  }

  // ══════════════════════════════════════════════════════════
  // STATE
  // ══════════════════════════════════════════════════════════
  let currentMode  = 'timein';
  let isProcessing = false;
  let html5Scanner = null;
  let scanCooldown = false;

  // ══════════════════════════════════════════════════════════
  // MODE TOGGLE
  // ══════════════════════════════════════════════════════════
  function setMode(mode) {
    currentMode = mode;
    document.getElementById('modeLabel').textContent = mode === 'timein' ? 'TIME IN' : 'TIME OUT';
    document.getElementById('btnIn').classList.toggle('active',  mode === 'timein');
    document.getElementById('btnOut').classList.toggle('active', mode === 'timeout');
    clearResult();
  }

  // ══════════════════════════════════════════════════════════
  // QR SCANNER — html5-qrcode
  // ══════════════════════════════════════════════════════════
  async function startScanner() {
    setStatus('Starting camera...');
    clearResult();

    const readerDiv = document.getElementById('qr-reader');
    readerDiv.style.display = 'block';

    html5Scanner = new Html5Qrcode('qr-reader');

    const config = {
      fps: 10,
      qrbox: { width: 220, height: 220 },
      aspectRatio: 1.0,
      formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ]
    };

    try {
      // Try rear camera first
      await html5Scanner.start(
        { facingMode: 'environment' },
        config,
        onScanSuccess,
        () => {} // silent scan failures
      );
      document.getElementById('btnOpen').style.display = 'none';
      document.getElementById('btnStop').style.display = 'block';
      setStatus('📷 Point camera at QR code...');

    } catch (err) {
      console.warn('Rear camera failed:', err);
      // Fallback: enumerate cameras and pick the last one (usually rear)
      try {
        const cameras = await Html5Qrcode.getCameras();
        if (cameras && cameras.length > 0) {
          const camId = cameras[cameras.length - 1].id;
          await html5Scanner.start(
            camId,
            config,
            onScanSuccess,
            () => {}
          );
          document.getElementById('btnOpen').style.display = 'none';
          document.getElementById('btnStop').style.display = 'block';
          setStatus('📷 Point camera at QR code...');
        } else {
          throw new Error('No cameras found on this device');
        }
      } catch (err2) {
        readerDiv.style.display = 'none';
        showResult(
          '❌ Camera failed.\n\n' +
          'Error: ' + err2.message + '\n\n' +
          '• Tap 🔒 in address bar → Camera → Allow\n' +
          '• Make sure no other app is using the camera\n' +
          '• Try refreshing the page',
          'error'
        );
      }
    }
  }

  function onScanSuccess(decodedText, decodedResult) {
    if (isProcessing || scanCooldown) return;
    scanCooldown = true;

    const empId = decodedText.trim().toUpperCase();
    setStatus('✅ QR detected: ' + empId);

    // Haptic feedback
    if (navigator.vibrate) navigator.vibrate(200);

    // Play a short beep
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.value = 0.3;
      osc.start();
      osc.stop(ctx.currentTime + 0.15);
    } catch(e) {}

    stopScanner();
    logAttendance(empId);

    setTimeout(() => { scanCooldown = false; }, 3000);
  }

  async function stopScanner() {
    if (html5Scanner) {
      try { await html5Scanner.stop(); } catch(e) {}
      try { html5Scanner.clear(); } catch(e) {}
      html5Scanner = null;
    }
    document.getElementById('qr-reader').style.display = 'none';
    document.getElementById('btnOpen').style.display = 'block';
    document.getElementById('btnStop').style.display = 'none';
    setStatus('Tap Open Camera to begin scanning');
  }

  // ══════════════════════════════════════════════════════════
  // MANUAL INPUT
  // ══════════════════════════════════════════════════════════
  function submitManual() {
    const id = document.getElementById('manualId').value.trim().toUpperCase();
    if (!id) { showResult('⚠️ Please enter an Employee ID.', 'error'); return; }
    logAttendance(id);
    document.getElementById('manualId').value = '';
  }

  // ══════════════════════════════════════════════════════════
  // LOG ATTENDANCE via JSONP
  // ══════════════════════════════════════════════════════════
  function logAttendance(empId) {
    if (isProcessing) return;

    if (!WEB_APP_URL) {
      showResult('⚠️ Web App URL not configured.\nScroll up and paste your URL.', 'error');
      return;
    }

    isProcessing = true;
    showSpinner(true, 'Logging ' + empId + '...');
    clearResult();

    const callbackName = 'cb_' + Date.now();
    const url = WEB_APP_URL +
      '?empId=' + encodeURIComponent(empId) +
      '&action=' + encodeURIComponent(currentMode) +
      '&callback=' + callbackName;

    window[callbackName] = function(data) {
      delete window[callbackName];
      const scriptEl = document.getElementById('jsonpScript');
      if (scriptEl) scriptEl.remove();

      showSpinner(false);
      showResult(data.message, data.success ? 'success' : 'error');

      if (data.success) {
        const now = new Date().toLocaleTimeString('en-PH', { hour:'2-digit', minute:'2-digit' });
        document.getElementById('lastScan').textContent = 'Last: ' + empId + ' at ' + now;
        document.body.style.background = currentMode === 'timein' ? '#0d2b1a' : '#1a0d2b';
        setTimeout(() => { document.body.style.background = '#0f0f1a'; }, 800);
      }
      isProcessing = false;
    };

    setTimeout(() => {
      if (window[callbackName]) {
        delete window[callbackName];
        const scriptEl = document.getElementById('jsonpScript');
        if (scriptEl) scriptEl.remove();
        showSpinner(false);
        showResult('❌ Request timed out.\nCheck your internet connection.', 'error');
        isProcessing = false;
      }
    }, 15000);

    const script = document.createElement('script');
    script.id  = 'jsonpScript';
    script.src = url;
    script.onerror = function() {
      if (window[callbackName]) {
        delete window[callbackName];
        showSpinner(false);
        showResult('❌ Could not reach server.\nCheck your Web App URL.', 'error');
        isProcessing = false;
      }
      this.remove();
    };
    document.body.appendChild(script);
  }

  // ══════════════════════════════════════════════════════════
  // UI HELPERS
  // ══════════════════════════════════════════════════════════
  function setStatus(msg) { document.getElementById('camStatus').textContent = msg; }
  function showSpinner(show, text) {
    document.getElementById('spinnerWrap').style.display = show ? 'block' : 'none';
    if (text) document.getElementById('spinnerText').textContent = text;
  }
  function showResult(msg, type) {
    const el = document.getElementById('result');
    el.textContent = msg; el.className = type;
    el.style.display = 'block';
    el.scrollIntoView({ behavior:'smooth', block:'center' });
  }
  function clearResult() {
    const el = document.getElementById('result');
    el.style.display = 'none'; el.textContent = '';
  }
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && html5Scanner) stopScanner();
  });

  // ══════════════════════════════════════════════════════════
  // FETCH BUSINESS INFO on page load
  // ══════════════════════════════════════════════════════════
  function fetchBusinessInfo() {
    if (!WEB_APP_URL) return;

    const callbackName = 'bizInfo_' + Date.now();
    const url = WEB_APP_URL + '?action=getInfo&callback=' + callbackName;

    window[callbackName] = function(data) {
      delete window[callbackName];
      const scriptEl = document.getElementById('bizInfoScript');
      if (scriptEl) scriptEl.remove();

      if (data && data.businessName) {
        document.getElementById('businessTitle').textContent = '👥 ' + data.businessName;
        document.title = data.businessName + ' — Time Scanner';

        let subtitle = 'Employee Attendance Logging';
        if (data.scheduleIn && data.scheduleOut) {
          subtitle += '  •  Schedule: ' + data.scheduleIn + ' – ' + data.scheduleOut;
        }
        document.getElementById('businessSubtitle').textContent = subtitle;
      }
    };

    // Timeout — just silently fail, keep defaults
    setTimeout(() => {
      if (window[callbackName]) {
        delete window[callbackName];
        const scriptEl = document.getElementById('bizInfoScript');
        if (scriptEl) scriptEl.remove();
      }
    }, 8000);

    const script = document.createElement('script');
    script.id = 'bizInfoScript';
    script.src = url;
    script.onerror = function() {
      delete window[callbackName];
      this.remove();
    };
    document.body.appendChild(script);
  }

  // Load business info when page opens
  if (WEB_APP_URL) {
    fetchBusinessInfo();
  }

  // Also fetch after saving URL for the first time
  const origSave = window.saveWebAppUrl;
  window.saveWebAppUrl = function() {
    const url = document.getElementById('setupUrl').value.trim();
    if (!url || !url.startsWith('https://script.google.com/')) {
      alert('Please enter a valid Google Apps Script Web App URL');
      return;
    }
    localStorage.setItem('WEB_APP_URL', url);
    WEB_APP_URL = url;
    document.getElementById('setupBanner').style.display = 'none';
    fetchBusinessInfo();
    alert('✅ URL saved! You\'re ready to scan.');
  };
</script>
</body>
</html>
